name: EGFR CADD

on:
  push:
    paths:
      - "README.md"
      - "Makefile"
      - "pyproject.toml"
      - "requirements.txt"
      - "environment.yml"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "reports/**"
      - "portfolio_assets/**"
      - ".github/workflows/egfr-cadd.yml"
  pull_request:
    paths:
      - "README.md"
      - "Makefile"
      - "pyproject.toml"
      - "requirements.txt"
      - "environment.yml"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "reports/**"
      - "portfolio_assets/**"
      - ".github/workflows/egfr-cadd.yml"

jobs:
  reproduce-small-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest
      - name: Verify public artifacts
        run: make reproduce-small PYTHON=python
      - name: Run tests
        run: make test PYTHON=python
